# ============================================
# A股量化选股系统 - 策略参数配置
# ============================================
# 
# 修改此文件后，策略会在下次运行时自动加载新参数
# 无需重启程序

# ============================================
# 碗口反弹策略 (BowlReboundStrategy)
# ============================================
# 策略逻辑：
# 1. 股票处于上升趋势（短期趋势线在多空线之上）
# 2. 价格回落至趋势线附近（碗中或短期趋势线附近）
# 3. 近期有过放量阳线（异动）
# 4. KDJ指标处于低位（J <= J_VAL）

BowlReboundStrategy:
  # N: 成交量倍数
  # 关键K线的成交量需 >= 前一日成交量 * N
  # 建议值: 3-5
  N: 2.4
  
  # M: 回溯天数
  # 在M天内是否存在关键K线
  # 建议值: 10-20
  M: 20
  
  # CAP: 流通市值门槛（单位：元）
  # 只选择流通市值大于此值的股票
  # 默认 40亿 = 4000000000
  # 建议值: 2000000000 (20亿) 到 100000000000 (1000亿)
  CAP: 4000000000
  
  # J_VAL: J值上限
  # KDJ指标的J值需 <= J_VAL 才符合买入条件
  # 建议值: 20-30 (低位买入)
  # 注意: J值越小表示越超卖，但可能错过一些反弹机会
  J_VAL: 0
  
  # M1-M4: 知行多空线计算用的MA周期
  # 知行多空线 = MA(CLOSE,M1)+MA(CLOSE,M2)+MA(CLOSE,M3)+MA(CLOSE,M4))/4
  # 默认使用 5,10,20,30 日均线组合
  M1: 14
  M2: 28
  M3: 57
  M4: 114
  
  # duokong_pct: 靠近多空线百分比
  # 价格距离知行多空线 ±duokong_pct% 范围内判定为"靠近多空线"
  # 建议值: 2-5
  duokong_pct: 1.7
  
  # short_pct: 靠近短期趋势线百分比
  # 价格距离知行短期趋势线 ±short_pct% 范围内判定为"靠近短期趋势线"
  # 建议值: 1.5-3
  short_pct: 2

# ============================================
# 砖型图策略 (BrickPatternStrategy)
# ============================================
# 策略逻辑：
# 1. 计算砖型图指标（基于高低收价格的多级平滑）
# 2. 砖型图趋势由下转上（AA 从 0 变为 1）

BrickPatternStrategy:
  # N1: 砖型图计算周期 (默认 4)
  N1: 4
  # N2: 平滑周期 (默认 6)
  N2: 6
  # M1-M4: 黄线(多空线)周期
  M1: 14
  M2: 28
  M3: 57
  M4: 114
  # J_LIMIT: J值上限约束
  J_LIMIT: 64
  # BRICK_RATIO: 砖体增长比率 (今天砖体/前天砖体)
  BRICK_RATIO: 0.66

# ============================================
# B1完美图形匹配 (B1PatternMatch)
# ============================================
# 功能说明：
# 将选股结果与10个历史成功案例进行四维相似度匹配
# 按相似度排序输出，帮助识别具有相似突破特征的股票
#
# 详细逻辑请参考: B1_PATTERN_MATCH.md

B1PatternMatch:
  # min_similarity: 最小相似度阈值
  # 只显示相似度 >= 此值的股票
  # 建议值: 50-70
  # - 50%: 宽松，显示更多候选
  # - 60%: 适中，平衡质量与数量
  # - 70%: 严格，只显示高度相似
  min_similarity: 60
  
  # lookback_days: 回看天数
  # 匹配时使用最近多少天的数据进行比较
  # 建议值: 15-40
  # - 15天: 短线整理（1-2周）
  # - 25天: 中线整理（3-4周）- 默认
  # - 40天: 长线整理（1-2月）
  lookback_days: 25
  
  # weights: 四维相似度权重
  # 四个维度的权重分配，总和应为1.0
  weights:
    trend_structure: 0.20   # 双线结构：短期/多空趋势线相对位置
    kdj_state: 0.10         # KDJ状态：J值位置、金叉状态
    volume_pattern: 0.35    # 量能特征：成交量变化模式
    price_shape: 0.35       # 价格形态：归一化曲线DTW匹配
  
  # tolerances: 匹配容差参数
  # 各项特征的容忍差异范围，越小越严格
  tolerances:
    trend_ratio: 0.10       # 趋势比值容差（±10%）
    price_bias: 10          # 价格偏离容差（±10%）
    trend_spread: 10        # 趋势发散容差（±10%）
    j_value: 30             # J值差异容差（±30）
    drawdown: 15            # 回撤幅度容差（±15%）
  
  top_n_results: 15         # 展示Top N个匹配结果（钉钉通知中显示的数量）

